name: Build API + Angular + Capacitor Android

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # .NET 9 setup + cache
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
          cache : false

      # Node.js 20 setup + cache
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./game/package-lock.json

      # Java + Gradle setup + cache
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      # Install Angular deps
      - name: Install Angular dependencies
        working-directory: ./game
        run: npm ci

      - name: Run Angular lint
        working-directory: ./game
        run: npm run lint

      - name: Build Angular (production)
        working-directory: ./game
        run: npm run build -- --configuration production

      - name: Copy Angular build to API wwwroot
        run: cp -r ./game/dist/slot-machine/browser/* ./Api/SlotMachine/wwwroot/

      # .NET build + tests
      - name: Restore .NET dependencies
        working-directory: ./Api
        run: dotnet restore

      - name: Run .NET tests
        working-directory: ./Api
        run: dotnet test --configuration Release --no-restore --logger "trx;LogFileName=test_results.trx"

      - name: Build .NET project
        working-directory: ./Api
        run: dotnet build --configuration Release --no-restore

      - name: Publish .NET project
        working-directory: ./Api/SlotMachine
        run: dotnet publish -c Release -o ./bin/Release/net9.0/publish

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: slotmachine-build
          path: ./Api/SlotMachine/bin/Release/net9.0/publish

      # ⚡ Capacitor Android build
      
      - name: Setup Android SDK path
        run: |
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/cmdline-tools/bin" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH
          which sdkmanager || true
          yes | sdkmanager --licenses || true
      - name: Set Android versionName and versionCode
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="1.0.${VERSION_CODE}"
          echo "Setting versionName=$VERSION_NAME and versionCode=$VERSION_CODE"
          sed -i "s/versionCode [0-9]\+/versionCode $VERSION_CODE/" game/android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"$VERSION_NAME\"/" game/android/app/build.gradle
      - name: Build Capacitor Android APK
        working-directory: ./game
        run: |
          npx cap sync android
          cd android
          ./gradlew assembleDebug

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: game/android/app/build/outputs/apk/debug/app-debug.apk
